# Dev / e2e stack for the migration core.
# Target-protocol strategy: JMAP FIRST, IMAP/CalDAV/CardDAV/WebDAV (DAV) second — both in MVP.
#
# Stalwart is the reference TARGET: it speaks JMAP *and* IMAP/SMTP/CalDAV/CardDAV/WebDAV,
# so one server exercises both target families. The O365 SOURCE is separate and uses
# IMAP+OAuth2/Graph (Microsoft has no JMAP), so it is not part of this local stack.
# Nextcloud is a second, DAV-only target (files + CalDAV/CardDAV) for heterogeneity tests.
#
# Trigger.dev is NOT here (heavy; the in-process scheduler drives the first slice; added later
# from github.com/triggerdotdev/docker). Images pinned and arm64-friendly (the Spark is arm64);
# base OS is current in every case (Alpine 3.x / Debian 13 "Trixie").
services:
  # Ledger database
  postgres:
    image: postgres:18-alpine            # multi-arch (arm64); base: Alpine 3.x (current)
    environment:
      POSTGRES_DB: openmig
      POSTGRES_USER: openmig
      POSTGRES_PASSWORD: openmig
      POSTGRES_INITDB_ARGS: -E UTF8
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openmig -d openmig"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks: [dev-network]

  # Reference target: JMAP + IMAP/SMTP + CalDAV/CardDAV/WebDAV (Rust; base debian:trixie-slim; multi-arch incl. arm64).
  # Running in normal mode (NOT recovery mode) to enable JMAP/IMAP listeners.
  # Stalwart 0.16 uses declarative JSON configuration - see stalwart-config.json.
  # The image's built-in healthcheck targets TLS/443; disabled here for plain-HTTP dev — the
  # e2e workflow polls readiness instead. JMAP session + DAV are served over the HTTP API (8080); IMAP on 143.
  stalwart:
    build:
      context: .
      dockerfile: Dockerfile.stalwart-config
    image: stalwart-custom:config
    # No STALWART_RECOVERY_MODE - run in normal operation mode with listeners enabled
    tmpfs:
      - /opt/stalwart/data:mode=777
    ports:
      - "8180:8080"  # JMAP/DAV HTTP API (host:container)
      - "143:143"    # IMAP (plain)
      - "993:993"    # IMAPS (TLS)
    healthcheck:
      disable: true
    networks: [dev-network]

  # Secondary DAV target: files (WebDAV) + CalDAV/CardDAV. SQLite keeps dev light.
  nextcloud:
    image: nextcloud:34-apache            # official multi-arch (arm64); base: Debian 13 "Trixie" via php image
    environment:
      SQLITE_DATABASE: nextcloud
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: admin_dev_pw
      NEXTCLOUD_TRUSTED_DOMAINS: "localhost nextcloud"
    networks: [dev-network]

volumes:
  stalwart-data:

networks:
  dev-network:
    name: openmig_dev-network
    driver: bridge
