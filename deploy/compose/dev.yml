# Dev / e2e stack for the migration core.
# Target-protocol strategy: JMAP FIRST, IMAP/CalDAV/CardDAV/WebDAV (DAV) second — both in MVP.
#
# Stalwart (the reference TARGET: it speaks JMAP *and* IMAP/SMTP/CalDAV/CardDAV/WebDAV, so one
# server exercises both target families) is intentionally NOT a service here. Stalwart requires
# a two-phase startup (provisioning in recovery mode, then serving in normal mode — see
# docs/stalwart-integration-fix.md) that plain `docker compose up` cannot express for one
# service. Bring it up with `deploy/selfhost/setup-stalwart.sh` instead — it joins this file's
# `openmig_dev-network` (see below), so anything on that network reaches it at `stalwart:8080`
# (JMAP) / `stalwart:993` (IMAPS) regardless of whether Stalwart was started before or after
# this stack. The O365 SOURCE is separate and uses IMAP+OAuth2/Graph (Microsoft has no JMAP),
# so it is not part of this local stack either. Nextcloud is a second, DAV-only target (files +
# CalDAV/CardDAV) for heterogeneity tests.
#
# Trigger.dev is NOT here (heavy; the in-process scheduler drives the first slice; added later
# from github.com/triggerdotdev/docker). Images pinned and arm64-friendly (the Spark is arm64);
# base OS is current in every case (Alpine 3.x / Debian 13 "Trixie").
services:
  # Ledger database
  postgres:
    image: postgres:18-alpine            # multi-arch (arm64); base: Alpine 3.x (current)
    environment:
      POSTGRES_DB: openmig
      POSTGRES_USER: openmig
      POSTGRES_PASSWORD: openmig
      POSTGRES_INITDB_ARGS: -E UTF8
    ports:
      # Overridable so CI/agents running this stack alongside other things on the
      # same host can pick a free port instead of assuming 5433 is available.
      - "${DEV_POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openmig -d openmig"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks: [dev-network]

  # Secondary DAV target: files (WebDAV) + CalDAV/CardDAV. SQLite keeps dev light.
  nextcloud:
    image: nextcloud:34-apache            # official multi-arch (arm64); base: Debian 13 "Trixie" via php image
    container_name: openmig-dev-nextcloud # fixed name so provisioning scripts can `docker exec` it deterministically
    environment:
      SQLITE_DATABASE: nextcloud
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: admin_dev_pw
      NEXTCLOUD_TRUSTED_DOMAINS: "localhost nextcloud"
    ports:
      # Overridable, same pattern as postgres above — the e2e workflow picks a free
      # port at runtime instead of assuming a fixed one is available on the runner.
      - "${DEV_NEXTCLOUD_PORT:-8082}:80"
    networks: [dev-network]

networks:
  dev-network:
    name: openmig_dev-network
    driver: bridge
