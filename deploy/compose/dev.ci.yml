# CI/e2e-only override for dev.yml — layer it on top when openmig_dev-network already
# exists as a raw `docker network create` (e.g. deploy/selfhost/setup-stalwart.sh ran
# first, as it does in .github/workflows/e2e.yml):
#
#   ./deploy/selfhost/setup-stalwart.sh
#   docker compose -f deploy/compose/dev.yml -f deploy/compose/dev.ci.yml up -d nextcloud
#
# Without this, `docker compose -f dev.yml up` refuses to attach to the pre-existing
# network ("a network with name openmig_dev-network exists but was not created by
# compose... Set `external: true` to use an existing network") — Compose only lets a
# `networks:` block without `external: true` create-or-reuse a network it labeled
# itself; a network created by a bare `docker network create` (as setup-stalwart.sh
# does, idempotently) has no such label.
#
# NEVER used by real self-host operators — this only exists for the e2e workflow.
# Mirrors deploy/selfhost/compose.dev.yml's identical fix for the appliance's own
# join to this same network. dev.yml itself stays standalone-friendly (no
# external: true there) for the common local-dev order where dev.yml runs FIRST and
# setup-stalwart.sh joins the network dev.yml created.
networks:
  dev-network:
    name: openmig_dev-network
    external: true
