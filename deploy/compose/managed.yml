# Managed deployment stack with Trigger.dev orchestration.
# Postgres version aligned with deploy/compose/dev.yml (Postgres 18).
#
# This stack includes:
# - PostgreSQL (ledger database)
# - Trigger.dev (managed orchestration platform)
# - Open Migration API & Worker
# - Web application
services:
  # PostgreSQL Database
  postgres:
    image: postgres:18-alpine
    container_name: open-migrate-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openmigrate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openmigrate_password}
      POSTGRES_DB: ${POSTGRES_DB:-openmigrate}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./packages/ledger/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openmigrate}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - open-migrate-network

  # Trigger.dev Backend
  trigger-db:
    image: postgres:18-alpine
    container_name: trigger-db
    environment:
      POSTGRES_USER: trigger
      POSTGRES_PASSWORD: trigger_password
      POSTGRES_DB: triggerdb
    volumes:
      - trigger_db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trigger"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - open-migrate-network

  trigger-redis:
    image: redis:7-alpine
    container_name: trigger-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - open-migrate-network

  trigger-api:
    # Pinned to v4.5.4 to match @trigger.dev/sdk in apps/worker (ADR-0004, §22.1)
    image: ghcr.io/triggerdotdev/trigger.dev:v4.5.4
    container_name: trigger-api
    user: root
    command: sh -c "chown -R node:node /home/node/shared && exec ./scripts/entrypoint.sh"
    environment:
      # Database
      DATABASE_URL: postgresql://trigger:trigger_password@trigger-db:5432/triggerdb
      DIRECT_URL: postgresql://trigger:trigger_password@trigger-db:5432/triggerdb
      # Auth secrets
      SESSION_SECRET: ${TRIGGER_SESSION_SECRET:-0123456789abcdef0123456789abcdef}
      MAGIC_LINK_SECRET: ${TRIGGER_MAGIC_LINK_SECRET:-fedcba9876543210fedcba9876543210}
      ENCRYPTION_KEY: ${TRIGGER_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef}
      LOGIN_SECRET: ${TRIGGER_LOGIN_SECRET:-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa1}
      MANAGED_WORKER_SECRET: ${TRIGGER_MANAGED_WORKER_SECRET:-bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb2}
      # Origins
      APP_ORIGIN: ${TRIGGER_APP_ORIGIN:-http://localhost:3090}
      LOGIN_ORIGIN: ${TRIGGER_LOGIN_ORIGIN:-http://localhost:3090}
      API_ORIGIN: ${TRIGGER_API_ORIGIN:-http://localhost:3090}
      # Redis
      REDIS_HOST: trigger-redis
      REDIS_PORT: 6379
      REDIS_TLS_DISABLED: "true"
      # Registry (for task deployments)
      DEPLOY_REGISTRY_HOST: localhost:5000
      DEPLOY_REGISTRY_NAMESPACE: trigger
      # Object storage (for large payloads)
      OBJECT_STORE_BASE_URL: http://minio:9000
      OBJECT_STORE_ACCESS_KEY_ID: admin
      OBJECT_STORE_SECRET_ACCESS_KEY: very-safe-password
      # ClickHouse (for task events) - disabled, using Postgres instead
      CLICKHOUSE_URL: ""
      EVENT_REPOSITORY_DEFAULT_STORE: postgres
      # Realtime streams - disabled, using v1 (Redis) instead
      REALTIME_STREAMS_DEFAULT_VERSION: v1
      # Bootstrap
      TRIGGER_BOOTSTRAP_ENABLED: "1"
      TRIGGER_BOOTSTRAP_WORKER_GROUP_NAME: bootstrap
      TRIGGER_BOOTSTRAP_WORKER_TOKEN_PATH: /home/node/shared/worker_token
      # Misc
      PORT: 3000
      APP_LOG_LEVEL: info
    ports:
      - "${TRIGGER_PORT:-3090}:3000"
    volumes:
      - trigger_shared:/home/node/shared
    depends_on:
      trigger-db:
        condition: service_healthy
      trigger-redis:
        condition: service_healthy
    networks:
      - open-migrate-network

  # Open Migration API
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: open-migrate-api
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      # DATABASE_URL = DB owner (migrations / seed). APP_DATABASE_URL = non-owner
      # `app_user` role the request path connects through so RLS is ALWAYS enforced
      # (a superuser/owner bypasses RLS even under FORCE — see workplan 0011 T1).
      DATABASE_URL: postgresql://${POSTGRES_USER:-openmigrate}:${POSTGRES_PASSWORD:-openmigrate_password}@postgres:5432/${POSTGRES_DB:-openmigrate}
      APP_DATABASE_URL: postgresql://${APP_DB_USER:-app_user}:${APP_DB_PASSWORD:-app_password}@postgres:5432/${POSTGRES_DB:-openmigrate}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      # Required to encrypt/decrypt connection credentials (create-mapping, worker deps).
      SECRET_ENCRYPTION_KEY: ${SECRET_ENCRYPTION_KEY:?set a 32-byte key in .env}
      JWT_EXPIRY: ${JWT_EXPIRY:-24h}
      TRIGGER_API_URL: http://trigger-api:3000
      TRIGGER_API_KEY: ${TRIGGER_API_KEY:-dev-api-key}
      MOLLIE_API_KEY: ${MOLLIE_API_KEY:-}
      MOLLIE_WEBHOOK_SECRET: ${MOLLIE_WEBHOOK_SECRET:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3123}
      WEB_URL: ${WEB_URL:-http://localhost:3123}
      API_URL: ${API_URL:-http://localhost:3001}
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      trigger-api:
        condition: service_started
    networks:
      - open-migrate-network

  # Open Migration Worker (disabled in v4 - tasks deploy directly to Trigger.dev)
  # worker:
  #   build:
  #     context: ../..
  #     dockerfile: apps/worker/Dockerfile
  #   container_name: open-migrate-worker
  #   environment:
  #     NODE_ENV: ${NODE_ENV:-development}
  #     DATABASE_URL: postgresql://${POSTGRES_USER:-openmigrate}:${POSTGRES_PASSWORD:-openmigrate_password}@postgres:5432/${POSTGRES_DB:-openmigrate}
  #     APP_DATABASE_URL: postgresql://${APP_DB_USER:-app_user}:${APP_DB_PASSWORD:-app_password}@postgres:5432/${POSTGRES_DB:-openmigrate}
  #     SECRET_ENCRYPTION_KEY: ${SECRET_ENCRYPTION_KEY:?set a 32-byte key in .env}
  #     TRIGGER_API_URL: http://trigger-api:3000
  #     TRIGGER_API_KEY: ${TRIGGER_API_KEY:-dev-api-key}
  #     IMAP_TIMEOUT: ${IMAP_TIMEOUT:-300}
  #     JMAP_TIMEOUT: ${JMAP_TIMEOUT:-300}
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     trigger-api:
  #       condition: service_started
  #   networks:
  #     - open-migrate-network

  # Web Application
  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_AUTH_URL: ${VITE_AUTH_URL:-/auth}
    container_name: open-migrate-web
    ports:
      - "${WEB_PORT:-3123}:80"
    depends_on:
      - api
    networks:
      - open-migrate-network

networks:
  open-migrate-network:
    driver: bridge

volumes:
  postgres_data:
  trigger_db_data:
  redis_data:
  trigger_shared:
