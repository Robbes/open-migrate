packages:
  - "packages/*"
  - "apps/*"
# pnpm 11 reads settings here (no longer from .npmrc or the package.json "pnpm" field).
# Build-script approval: pnpm 11 uses the allowBuilds map below (package -> true/false).
# The older onlyBuiltDependencies list is parsed but NO LONGER authorizes builds on its own —
# without allowBuilds, a fresh install exits 1 with ERR_PNPM_IGNORED_BUILDS.
verifyDepsBeforeRun: false
autoInstallPeers: true
strictPeerDependencies: false
allowBuilds:
  better-sqlite3: true
  cpu-features: true
  esbuild: true
  libxmljs2: true
  protobufjs: true
  ssh2: true
catalog:
  drizzle-orm: ^0.45.2
  pg: ^8
  "@types/pg": ^8
overrides:
  semver: ^7.5.2
  ws: ">=8.21.0"
  socket.io-client: ^4.8.0
  engine.io-client: ^6.6.0
  "@opentelemetry/core": ">=2.8.0"
  cookie: ">=0.7.0"
  # Security overrides (transitive CVEs surfaced by Trivy → code-scanning + pnpm audit):
  #   engine.io  GHSA-r635-g3xr-vw7x (HIGH, prod via @trigger.dev → socket.io)
  #   brace-expansion GHSA-3jxr-9vmj-r5cp (HIGH, dev/CI: testcontainers, cyclonedx, eslint) — scoped per major
  #   body-parser GHSA-v422-hmwv-36x6 (LOW, prod via express)
  # esbuild GHSA-67mh-4wv8-2f99 (MODERATE, dev-only) is intentionally NOT pinned here: its fix ships
  # in 0.25.0 (no 0.24.3 exists) and forcing that onto drizzle-kit's deprecated @esbuild-kit loader is
  # risky for a dev-server-only issue — left to Dependabot.
  body-parser@<1.20.6: ^1.20.6
  brace-expansion@<1.1.16: ^1.1.16
  brace-expansion@>=2.0.0 <2.1.2: ^2.1.2
  engine.io@>=4.1.0 <6.6.7: ^6.6.7
minimumReleaseAgeExclude:
  - brace-expansion@2.1.2
  - brace-expansion@1.1.16
  - engine.io@6.6.7
  - body-parser@1.20.6
