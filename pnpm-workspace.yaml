packages:
  - "packages/*"
  - "apps/*"
# pnpm 11 reads settings here (no longer from .npmrc or the package.json "pnpm" field).
# Build-script approval: pnpm 11 uses the allowBuilds map below (package -> true/false).
# The older onlyBuiltDependencies list is parsed but NO LONGER authorizes builds on its own —
# without allowBuilds, a fresh install exits 1 with ERR_PNPM_IGNORED_BUILDS.
verifyDepsBeforeRun: false
autoInstallPeers: true
strictPeerDependencies: false
allowBuilds:
  better-sqlite3: true
  cpu-features: true
  esbuild: true
  libxmljs2: true
  protobufjs: true
  ssh2: true
catalog:
  drizzle-orm: ^0.45.2
  pg: ^8
  "@types/pg": ^8
overrides:
  semver: ^7.5.2
  ws: ">=8.21.0"
  socket.io-client: ^4.8.0
  engine.io-client: ^6.6.0
  "@opentelemetry/core": ">=2.8.0"
  cookie: ">=0.7.0"
