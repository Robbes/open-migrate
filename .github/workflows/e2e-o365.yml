name: E2E O365 (Secret-Gated)

# ==============================================================================
# Secret-gated real-tenant E2E for the O365 source (workplan 0008 T7).
#
# MANUAL-ONLY (workflow_dispatch). Runs the `O365 End-to-End Scenario` suite in
# test/e2e/o365-scenario.e2e.test.ts, which — with the secrets below present —
# does the whole acceptance chain itself:
#   read-only-scope enforcement → first shadow pass → sleep PAST real token
#   expiry → prove refresh → second shadow pass → idempotency, and (optionally)
#   the 24 h soak variant.
# Without the secrets the suite skips, so this workflow is meaningful only with
# a real Azure AD app + a read-only O365 test tenant configured.
#
# Required secrets:  O365_CLIENT_ID, O365_TENANT_ID
# Optional secrets:  O365_CLIENT_SECRET (app-only), O365_SCOPE,
#                    O365_REFRESH_TOKEN / O365_USERNAME / O365_PASSWORD (delegated)
#
# Runs on the Spark arm64 self-hosted runner. Read-only is enforced by the test
# itself (it asserts no write scopes in the token claims and aborts otherwise).
# ==============================================================================

on:
  workflow_dispatch:
    inputs:
      soak_test_24h:
        description: 'Enable the 24h soak variant (long-running)'
        required: false
        type: boolean
        default: false
      mail_enabled:
        description: 'Enable mail sync'
        required: false
        type: boolean
        default: true
      calendar_enabled:
        description: 'Enable calendar sync'
        required: false
        type: boolean
        default: true
      contacts_enabled:
        description: 'Enable contacts sync'
        required: false
        type: boolean
        default: true
      files_enabled:
        description: 'Enable files sync'
        required: false
        type: boolean
        default: false
      concurrency:
        description: 'Concurrency level for sync'
        required: false
        type: number
        default: 4

# Don't cancel in progress - e2e runs long (token-expiry sleep) and should complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: false

env:
  # O365 configuration (from repo/environment secrets).
  O365_CLIENT_ID: ${{ secrets.O365_CLIENT_ID }}
  O365_CLIENT_SECRET: ${{ secrets.O365_CLIENT_SECRET }}
  O365_TENANT_ID: ${{ secrets.O365_TENANT_ID }}
  O365_SCOPE: ${{ secrets.O365_SCOPE || 'https://graph.microsoft.com/.default' }}
  O365_REFRESH_TOKEN: ${{ secrets.O365_REFRESH_TOKEN }}
  O365_USERNAME: ${{ secrets.O365_USERNAME }}
  O365_PASSWORD: ${{ secrets.O365_PASSWORD }}

  # Per-domain toggles + concurrency (consumed by the suite's beforeAll).
  O365_MAIL_ENABLED: ${{ github.event.inputs.mail_enabled || 'true' }}
  O365_CALENDAR_ENABLED: ${{ github.event.inputs.calendar_enabled || 'true' }}
  O365_CONTACTS_ENABLED: ${{ github.event.inputs.contacts_enabled || 'true' }}
  O365_FILES_ENABLED: ${{ github.event.inputs.files_enabled || 'false' }}
  O365_CONCURRENCY: ${{ github.event.inputs.concurrency || '4' }}
  SOAKE_TEST_24H: ${{ github.event.inputs.soak_test_24h || 'false' }}

jobs:
  e2e-o365:
    runs-on: [self-hosted, linux, arm64, spark]
    steps:
      - name: Validate required secrets
        run: |
          if [ -z "$O365_CLIENT_ID" ] || [ -z "$O365_TENANT_ID" ]; then
            echo "::error::O365_CLIENT_ID and O365_TENANT_ID secrets are required — the suite would otherwise skip."
            exit 1
          fi
          echo "✓ Required O365 secrets present (client ${O365_CLIENT_ID:0:8}…, tenant $O365_TENANT_ID)"

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4.5.0
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # The suite is the whole acceptance chain: read-only enforcement, first
      # pass, sleep-past-expiry token refresh, second pass, idempotency, and the
      # optional soak (gated on SOAKE_TEST_24H). Read-only is enforced inside the
      # test — a write scope in the token claims fails the run.
      - name: Run O365 real-tenant e2e (incl. token-refresh + idempotency)
        run: pnpm test:e2e -- --grep "O365 End-to-End Scenario"

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.0
        with:
          name: o365-e2e-reports
          path: '**/reports/'
          retention-days: 7
