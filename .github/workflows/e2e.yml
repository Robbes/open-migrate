name: E2E (self-hosted)

# ==============================================================================
# Intentionally SEPARATE from CI (ci.yml). Manual-trigger only: needs the
# self-hosted Spark runner + Docker. Drives the workplan 0010 T5 acceptance gate
# — the self-host appliance's restart-resume idempotency property — end to end,
# for THREE domains (issue #114 follow-up extended this from mail-only to also
# cover calendar/contacts; WebDAV files remains a deferred follow-up):
#
#   1. Bring up Stalwart via deploy/selfhost/setup-stalwart.sh — the ONE canonical
#      two-phase (recovery-mode provisioning, then normal-mode serving) bring-up
#      for this repo (see docs/stalwart-integration-fix.md; plain `docker compose
#      up` cannot express Stalwart's two-phase requirement for one service, which
#      is why this is a script, not a dev.yml service). Publishes JMAP + IMAPS on
#      the host so the appliance can reach them via host.docker.internal, and also
#      joins openmig_dev-network under the alias "stalwart" — so a sandboxed agent
#      that joins that same network (see the doc's DooD section) can reach it by
#      name instead, with no published ports involved at all.
#   1b. Bring up Nextcloud (deploy/compose/dev.yml's `nextcloud` service) on the
#      same openmig_dev-network, then provision TWO accounts on it — e2e-source and
#      e2e-target (deploy/selfhost/setup-nextcloud-users.sh) — so calendar/contacts
#      sync is proven ACROSS accounts, the real-world shape, not within one shared
#      admin account like the source-only DAV integration tests use.
#   2. SEED the source mailbox over IMAPS (the gate is only meaningful against a
#      non-zero source; v0.16.10 doesn't bind plaintext IMAP in normal mode, so
#      this — like the rest of the repo — uses TLS, not port 143) AND seed calendar
#      events + contacts into the e2e-source Nextcloud account (test/e2e/seed-dav-source.mjs).
#   3. Build + start the self-host appliance (deploy/selfhost/compose.yml) with
#      a mapping generated from the fixture and the source/target passwords —
#      mail, calendar, and contacts domains all enabled.
#   4. Run the Restart-Resume Idempotency Gate e2e for each domain: first pass
#      syncs N → `docker compose restart app` → second pass must NOT grow itemsSynced.
#
# Ports: this runner is shared with other work (other manual dispatches, agent
# sessions, etc. on the same box), so every host port this workflow needs is
# picked fresh at runtime (see "Pick free host ports" below) instead of assuming
# fixed numbers are free — see docs/stalwart-integration-fix.md "Running from
# inside a sandboxed agent container" for the failure mode this avoids. Stalwart's
# own container/volume/network names stay fixed (it's meant to be a shared,
# reusable dev resource, same as deploy/compose/dev.yml's postgres/nextcloud) —
# only the ports are dynamic.
#
# ⚠️ This workflow orchestrates Docker + a live mail seed and CANNOT be validated
# off the runner. Treat the first dispatch as a shakedown run.
# HARD RULE 5: no managed-only services here (no Trigger.dev / billing).
# ==============================================================================
on:
  workflow_dispatch:
    inputs:
      seed_count:
        description: 'Number of messages to seed into the source mailbox'
        required: false
        type: number
        default: 5

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: false

env:
  SELFHOST_COMPOSE: deploy/selfhost/compose.yml
  # SELFHOST_PORT is NOT fixed here — it's computed in "Pick free host ports"
  # below and exported to $GITHUB_ENV so it's free regardless of what else is
  # running on this box.
  SELFHOST_BIND: '127.0.0.1'
  # Dev-stack credentials (match deploy/selfhost/setup-stalwart.sh's provisioning plan).
  SOURCE_IMAP_PASSWORD: source_password
  TARGET_JMAP_PASSWORD: target_password
  POSTGRES_PASSWORD: selfhost_e2e_pw
  # Nextcloud (calendar + contacts DAV target — deploy/compose/dev.yml's `nextcloud`
  # service) — admin creds match that file's defaults; the two e2e accounts are
  # provisioned fresh each run by deploy/selfhost/setup-nextcloud-users.sh.
  NEXTCLOUD_ADMIN_USER: admin
  NEXTCLOUD_ADMIN_PASSWORD: admin_dev_pw
  NEXTCLOUD_SOURCE_USER: e2e-source
  SOURCE_DAV_PASSWORD: e2e_source_pw
  NEXTCLOUD_TARGET_USER: e2e-target
  TARGET_DAV_PASSWORD: e2e_target_pw
  # The restart-resume test uses the selfhost stack, not Testcontainers — skip the
  # heavy DAV/mail containers the root e2e global-setup would otherwise boot.
  SKIP_STALWART: 'true'
  SKIP_NEXTCLOUD: 'true'

jobs:
  e2e-selfhost:
    runs-on: [self-hosted, linux, arm64]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4.5.0
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Install stalwart-cli
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf https://github.com/stalwartlabs/cli/releases/latest/download/stalwart-cli-installer.sh | sh
          export PATH="$HOME/.cargo/bin:$PATH"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          which stalwart-cli
          stalwart-cli --version

      - name: Clean up any previous stacks (fresh volumes)
        run: |
          docker compose -f "$SELFHOST_COMPOSE" down -v --remove-orphans 2>/dev/null || true
          docker rm -f openmig-dev-stalwart 2>/dev/null || true
          docker volume rm openmig-dev-stalwart-data 2>/dev/null || true
          docker rm -f openmig-dev-nextcloud 2>/dev/null || true

      # Pick genuinely free host ports for everything this workflow publishes
      # (Stalwart JMAP/IMAPS, the selfhost appliance), instead of assuming
      # fixed numbers are available. Each freePort() call binds to port 0 (the
      # OS hands back an unused ephemeral port), reads it back, then closes —
      # the same trick Testcontainers uses, which is why the Testcontainers-driven
      # integration-tests job never hits this class of collision.
      - name: Pick free host ports
        run: |
          node -e '
            const net = require("node:net");
            const fs = require("node:fs");
            function freePort() {
              return new Promise((resolve, reject) => {
                const srv = net.createServer();
                srv.on("error", reject);
                srv.listen(0, "127.0.0.1", () => {
                  const { port } = srv.address();
                  srv.close(() => resolve(port));
                });
              });
            }
            (async () => {
              const [jmap, imaps, selfhost, nextcloud] = await Promise.all([freePort(), freePort(), freePort(), freePort()]);
              const lines = [
                `STALWART_JMAP_PORT=${jmap}`,
                `STALWART_IMAPS_PORT=${imaps}`,
                `SELFHOST_PORT=${selfhost}`,
                `DEV_NEXTCLOUD_PORT=${nextcloud}`,
              ];
              fs.appendFileSync(process.env.GITHUB_ENV, lines.join("\n") + "\n");
              console.log("Picked free ports:\n" + lines.join("\n"));
            })().catch((err) => { console.error(err); process.exit(1); });
          '

      - name: Start Stalwart (source + target)
        run: ./deploy/selfhost/setup-stalwart.sh

      - name: Start Nextcloud (calendar + contacts DAV target)
        run: docker compose -f deploy/compose/dev.yml up -d nextcloud

      - name: Provision Nextcloud DAV users (e2e-source, e2e-target)
        env:
          NEXTCLOUD_HOST_PORT: ${{ env.DEV_NEXTCLOUD_PORT }}
          NEXTCLOUD_SOURCE_PASSWORD: ${{ env.SOURCE_DAV_PASSWORD }}
          NEXTCLOUD_TARGET_PASSWORD: ${{ env.TARGET_DAV_PASSWORD }}
        run: ./deploy/selfhost/setup-nextcloud-users.sh

      - name: Seed the source mailbox (N>0 messages, over IMAPS)
        env:
          SEED_IMAP_HOST: 127.0.0.1
          SEED_IMAP_PORT: ${{ env.STALWART_IMAPS_PORT }}
          SEED_IMAP_TLS: 'true'
          SEED_IMAP_USER: source@dev.local
          SEED_IMAP_PASSWORD: ${{ env.SOURCE_IMAP_PASSWORD }}
          SEED_COUNT: ${{ github.event.inputs.seed_count || '5' }}
        run: node test/e2e/seed-imap-source.mjs

      - name: Seed calendar events + contacts (N>0, over DAV)
        env:
          SEED_DAV_URL: http://127.0.0.1:${{ env.DEV_NEXTCLOUD_PORT }}
          SEED_DAV_SOURCE_USER: ${{ env.NEXTCLOUD_SOURCE_USER }}
          SEED_DAV_SOURCE_PASSWORD: ${{ env.SOURCE_DAV_PASSWORD }}
          SEED_COUNT: ${{ github.event.inputs.seed_count || '5' }}
        run: node test/e2e/seed-dav-source.mjs

      - name: Prepare appliance config + secrets
        run: |
          # Fixture mapping is git-ignored under the config dir on purpose; the
          # Dockerfile bakes deploy/selfhost/config into the image. The appliance
          # reaches Stalwart/Nextcloud over openmig_dev-network by container name
          # (see deploy/selfhost/compose.dev.yml, applied below) — container-to-
          # container traffic uses each service's fixed internal port (Stalwart
          # 8080/993, Nextcloud 80), not whatever dynamic host port it's published
          # under, so no port substitution needed for either.
          node -e '
            const fs = require("node:fs");
            const cfg = JSON.parse(fs.readFileSync("test/e2e/fixtures/selfhost-restart-resume.mapping.json", "utf8"));
            cfg.source.host = "stalwart";
            cfg.source.port = 993;
            // baseUrl is the JMAP ORIGIN only — the connector appends /.well-known/jmap
            // (session) and /jmap (API) itself. Including the well-known path here would
            // double it and the session never loads ("Not connected to JMAP server").
            cfg.target.baseUrl = "http://stalwart:8080";
            cfg.domains.mail.source.host = "stalwart";
            cfg.domains.mail.source.port = 993;
            cfg.domains.mail.target.baseUrl = "http://stalwart:8080";
            const nextcloudDav = "http://nextcloud/remote.php/dav";
            cfg.domains.calendar.source.url = nextcloudDav;
            cfg.domains.calendar.target.url = nextcloudDav;
            cfg.domains.contacts.source.url = nextcloudDav;
            cfg.domains.contacts.target.url = nextcloudDav;
            fs.writeFileSync("deploy/selfhost/config/mapping.json", JSON.stringify(cfg, null, 2));
          '
          cat > deploy/selfhost/.env <<ENV
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          SOURCE_IMAP_PASSWORD=${SOURCE_IMAP_PASSWORD}
          TARGET_JMAP_PASSWORD=${TARGET_JMAP_PASSWORD}
          SOURCE_DAV_PASSWORD=${SOURCE_DAV_PASSWORD}
          TARGET_DAV_PASSWORD=${TARGET_DAV_PASSWORD}
          ENV

      - name: Build + start the self-host appliance
        run: |
          # --force-recreate: the app image ships TS source (runs under tsx), so a rebuilt
          # image must actually replace the running container — belt-and-suspenders against
          # a stale container surviving the rebuild. pgdata/appdata are named volumes and
          # persist across the recreate, so this doesn't reset any state the T5 gate needs.
          docker compose -f "$SELFHOST_COMPOSE" -f deploy/selfhost/compose.dev.yml up -d --build --force-recreate --wait || \
            { docker compose -f "$SELFHOST_COMPOSE" logs app; exit 1; }
          docker compose -f "$SELFHOST_COMPOSE" ps

      - name: Green-light the mapping (0013 T7 — mappings load paused until confirmed)
        run: |
          # Since workplan 0013 T7 the appliance loads every mapping PAUSED and only schedules
          # it after an explicit POST /mappings/:id/start (the "Start migration" green light).
          # The restart-resume gate expects the mapping to actually run, so activate it here —
          # this also exercises the real activation endpoint. The id is the config mappingId.
          MAPPING_ID="$(node -e 'console.log(JSON.parse(require("node:fs").readFileSync("deploy/selfhost/config/mapping.json","utf8")).mappingId)')"
          echo "Activating mapping ${MAPPING_ID} on http://127.0.0.1:${SELFHOST_PORT}"
          code="$(curl -s -o /dev/null -w '%{http_code}' -X POST "http://127.0.0.1:${SELFHOST_PORT}/mappings/${MAPPING_ID}/start")"
          echo "POST /start -> ${code}"
          # 303 = activated (redirect to /), 409 = already active/cutover — both fine; anything else fails.
          case "$code" in 200|303|409) ;; *) echo "unexpected activation status"; docker compose -f "$SELFHOST_COMPOSE" logs app; exit 1;; esac

      - name: Run Restart-Resume Idempotency Gate (0010 T5)
        run: pnpm test:e2e -- --grep "Restart-Resume"

      - name: Appliance + Stalwart + Nextcloud diagnostics
        if: always()
        run: |
          # Runs whether the gate passed or failed (the test no longer tears the stack down, so
          # the container is still here). On an itemsSynced=0 / sync failure, the appliance's own
          # "[Worker] <domain> sync complete: scanned=.. created=.. skipped=.." line (or the error)
          # is what tells us why. Tee everything to a file so it also uploads as an artifact
          # (the old `**/reports/` upload matched nothing — this test writes no report dir).
          mkdir -p diagnostics
          {
            echo "===== /status ====="
            curl -s "http://127.0.0.1:${SELFHOST_PORT}/status" | (jq . 2>/dev/null || cat) || true
            echo "===== appliance app logs ====="
            docker compose -f "$SELFHOST_COMPOSE" -f deploy/selfhost/compose.dev.yml logs app --no-color --tail 400 || true
            echo "===== Stalwart logs (tail) ====="
            docker logs openmig-dev-stalwart --tail 150 2>&1 || true
            echo "===== Nextcloud logs (tail) ====="
            docker logs openmig-dev-nextcloud --tail 150 2>&1 || true
          } 2>&1 | tee diagnostics/e2e-diagnostics.txt

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.0
        with:
          name: selfhost-e2e-diagnostics
          path: |
            diagnostics/
            test-logs/
          if-no-files-found: ignore
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          docker compose -f "$SELFHOST_COMPOSE" -f deploy/selfhost/compose.dev.yml down -v --remove-orphans || true
          docker rm -f openmig-dev-stalwart || true
          docker volume rm openmig-dev-stalwart-data || true
          docker compose -f deploy/compose/dev.yml down --remove-orphans || true
          docker rm -f openmig-dev-nextcloud || true
          rm -f deploy/selfhost/.env deploy/selfhost/config/mapping.json || true
