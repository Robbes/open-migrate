## Webhooks

### Trigger.dev Webhook

Receive job status updates from Trigger.dev.

**POST** `/api/webhooks/trigger`

**Headers:**
```
x-trigger-signature: <hmac-sha256-signature>
```

**Request Body:**
```json
{
  "id": "webhook-123",
  "eventType": "job.run.completed",
  "job": {
    "id": "run-full-sync",
    "name": "Full Sync"
  },
  "run": {
    "id": "run-123",
    "status": "success",
    "startedAt": "2024-01-01T00:00:00Z",
    "finishedAt": "2024-01-01T01:00:00Z"
  },
  "payload": {
    "tenantId": "tenant-123",
    "mappingId": "mapping-123"
  },
  "createdAt": "2024-01-01T01:00:00Z"
}
```

**Response:**
```json
{
  "received": true
}
```

