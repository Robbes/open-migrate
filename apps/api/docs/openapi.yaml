# Open Migration Stack API Specification

OpenAPI 3.0 specification for the Open Migration Stack managed edition API.

## Overview

The Open Migration Stack API provides REST endpoints for:
- Tenant management
- Migration configuration and control
- Billing and usage tracking
- Job orchestration

## Base URL

```
https://api.openmigrate.example.com/v1
```

## Authentication

All API endpoints require JWT authentication via the `Authorization` header:

```
Authorization: Bearer <jwt_token>
```

The JWT token must contain the following claims:
- `sub`: User ID
- `email`: User email
- `tenantId`: Current tenant ID
- `role`: User role (owner, admin, member, viewer)

## Common Response Codes

- `200`: Success
- `201`: Created
- `204`: No Content (successful deletion)
- `400`: Bad Request (validation error)
- `401`: Unauthorized (missing or invalid token)
- `403`: Forbidden (insufficient permissions)
- `404`: Not Found
- `500`: Internal Server Error

