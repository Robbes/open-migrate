## Migrations (Mappings)

### List Mappings

Get all mappings for the current tenant.

**GET** `/api/mappings`

**Response:**
```json
{
  "mappings": [
    {
      "id": "mapping-1",
      "tenantId": "tenant-123",
      "name": "Demo Migration",
      "sourceType": "imap",
      "targetType": "jmap",
      "status": "active",
      "lastSyncAt": "2024-01-01T00:00:00Z",
      "createdAt": "2024-01-01T00:00:00Z"
    }
  ]
}
```

### Create Mapping

Create a new migration mapping.

**POST** `/api/mappings`

**Request Body:**
```json
{
  "name": "My Migration",
  "sourceType": "imap",
  "targetType": "jmap",
  "sourceConfig": {
    "host": "imap.example.com",
    "port": 993,
    "username": "user@example.com",
    "useSsl": true
  },
  "targetConfig": {
    "host": "jmap.example.com",
    "port": 443,
    "username": "user@example.com",
    "password": "secret",
    "useSsl": true
  },
  "syncConfig": {
    "domains": ["email", "calendar"],
    "schedule": "0 2 * * *"
  }
}
```

**Response:**
```json
{
  "id": "mapping-123",
  "tenantId": "tenant-123",
  "name": "My Migration",
  "sourceType": "imap",
  "targetType": "jmap",
  "sourceConfig": {...},
  "targetConfig": {...},
  "syncConfig": {...},
  "status": "draft",
  "createdAt": "2024-01-01T00:00:00Z"
}
```

### Get Mapping

Get mapping details.

**GET** `/api/mappings/:mappingId`

**Response:**
```json
{
  "id": "mapping-123",
  "tenantId": "tenant-123",
  "name": "My Migration",
  "sourceType": "imap",
  "targetType": "jmap",
  "sourceConfig": {...},
  "targetConfig": {...},
  "syncConfig": {...},
  "status": "active",
  "lastSyncAt": "2024-01-01T00:00:00Z",
  "createdAt": "2024-01-01T00:00:00Z"
}
```

### Update Mapping

Update mapping configuration.

**PUT** `/api/mappings/:mappingId`

**Request Body:** (all fields optional)
```json
{
  "name": "Updated Migration Name",
  "syncConfig": {
    "schedule": "0 */6 * * *"
  }
}
```

**Response:**
```json
{
  "id": "mapping-123",
  "name": "Updated Migration Name",
  "syncConfig": {...},
  "updatedAt": "2024-01-02T00:00:00Z"
}
```

### Delete Mapping

Delete a mapping.

**DELETE** `/api/mappings/:mappingId`

**Response:** `204 No Content`

### Trigger Sync

Trigger a sync for a mapping.

**POST** `/api/mappings/:mappingId/sync`

**Request Body:**
```json
{
  "type": "full",
  "forceFullScan": false
}
```

**Response:**
```json
{
  "success": true,
  "runId": "run-123",
  "jobType": "full",
  "triggeredAt": "2024-01-01T00:00:00Z"
}
```

### Trigger Cutover

Trigger cutover for a mapping.

**POST** `/api/mappings/:mappingId/cutover`

**Request Body:**
```json
{
  "skipFinalSync": false,
  "skipVerification": false,
  "gracePeriodHours": 24
}
```

**Response:**
```json
{
  "success": true,
  "runId": "run-cutover-123",
  "triggeredAt": "2024-01-01T00:00:00Z",
  "gracePeriodEnd": "2024-01-02T00:00:00Z"
}
```

### List Runs

Get sync runs for a mapping.

**GET** `/api/mappings/:mappingId/runs`

**Response:**
```json
{
  "runs": [
    {
      "id": "run-1",
      "mappingId": "mapping-123",
      "type": "full",
      "status": "success",
      "startedAt": "2024-01-01T00:00:00Z",
      "finishedAt": "2024-01-01T01:00:00Z",
      "itemsProcessed": 1250,
      "errors": 0
    }
  ]
}
```

### Get Run Details

Get run details and logs.

**GET** `/api/mappings/:mappingId/runs/:runId`

**Response:**
```json
{
  "id": "run-1",
  "mappingId": "mapping-123",
  "type": "full",
  "status": "success",
  "startedAt": "2024-01-01T00:00:00Z",
  "finishedAt": "2024-01-01T01:00:00Z",
  "itemsProcessed": 1250,
  "errors": 0,
  "events": [
    {
      "level": "info",
      "message": "Starting full sync",
      "at": "2024-01-01T00:00:00Z"
    },
    {
      "level": "info",
      "message": "Processed 1250 items",
      "at": "2024-01-01T00:50:00Z"
    },
    {
      "level": "info",
      "message": "Sync completed successfully",
      "at": "2024-01-01T01:00:00Z"
    }
  ]
}
```

