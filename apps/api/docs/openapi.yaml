## Tenants

### List Tenants

Get all tenants for the authenticated user.

**GET** `/api/tenants`

**Response:**
```json
{
  "tenants": [
    {
      "id": "string",
      "name": "string",
      "slug": "string",
      "createdAt": "2024-01-01T00:00:00Z"
    }
  ]
}
```

### Create Tenant

Create a new tenant.

**POST** `/api/tenants`

**Request Body:**
```json
{
  "name": "My Company",
  "slug": "my-company",
  "settings": {
    "maxMappings": 10,
    "maxUsers": 5
  }
}
```

**Response:**
```json
{
  "id": "tenant-123",
  "name": "My Company",
  "slug": "my-company",
  "ownerId": "user-123",
  "settings": {
    "maxMappings": 10,
    "maxUsers": 5
  },
  "createdAt": "2024-01-01T00:00:00Z"
}
```

### Get Tenant

Get tenant details.

**GET** `/api/tenants/:tenantId`

**Response:**
```json
{
  "id": "tenant-123",
  "name": "My Company",
  "slug": "my-company",
  "settings": {
    "maxMappings": 10,
    "maxUsers": 5
  },
  "createdAt": "2024-01-01T00:00:00Z"
}
```

### Update Tenant

Update tenant settings.

**PUT** `/api/tenants/:tenantId`

**Request Body:**
```json
{
  "name": "My Company Updated",
  "settings": {
    "maxMappings": 20
  }
}
```

**Response:**
```json
{
  "id": "tenant-123",
  "name": "My Company Updated",
  "updatedAt": "2024-01-02T00:00:00Z"
}
```

### Delete Tenant

Delete a tenant (owner only).

**DELETE** `/api/tenants/:tenantId`

**Response:** `204 No Content`

