[dataStore]
type = "RocksDb"
path = "/opt/stalwart/data"

[http.listeners.default]
address = "0.0.0.0:8080"
protocols = ["jmap", "admin"]

[imap.listeners.default]
address = "0.0.0.0:143"

[directory.internal]

[accessControl.principals.admin]
type = "Individual"
permissions = ["admin"]
credentials = [{ "@type" = "Password", secret = "devadmin123" }]

[domains."dev.local"]
isEnabled = true

[accounts."source"]
domainId = "dev_local"
credentials = [{ "@type" = "Password", secret = "source_password" }]

[accounts."target"]
domainId = "dev_local"
credentials = [{ "@type" = "Password", secret = "target_password" }]
